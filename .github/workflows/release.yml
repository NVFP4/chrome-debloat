name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: chrome-debloat

jobs:
  check:
    name: Check release readiness
    runs-on: ubuntu-latest
    steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0
      with:
        components: clippy

    - name: Install nightly rustfmt
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rustfmt

    - name: Format
      run: cargo +nightly fmt --all --check

    - name: Clippy
      run: cargo +1.95.0 clippy --workspace --all-targets --all-features -- -D warnings

    - name: Build
      run: cargo +1.95.0 build --workspace --all-features --locked

    - name: Test
      run: cargo +1.95.0 test --workspace --all-features

  prepare:
    name: Prepare release
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0

    - name: Install cargo-release
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-release

    - name: Configure git author
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Prepare release version
      shell: bash
      run: |
        git fetch --force --tags
        version="$(cargo metadata --no-deps --format-version 1 \
          | jq -er --arg name "$PACKAGE_NAME" '.packages[] | select(.name == $name) | .version')"

        if [[ "$version" == *-* ]]; then
          cargo release release \
            --execute \
            --no-confirm \
            --no-publish \
            --no-tag \
            --no-push
        fi

    - name: Resolve release tag
      id: release
      shell: bash
      run: |
        version="$(cargo metadata --no-deps --format-version 1 \
          | jq -er --arg name "$PACKAGE_NAME" '.packages[] | select(.name == $name) | .version')"

        # cargo-release must leave us on a stable version before tagging.
        if [[ "$version" == *-* ]]; then
          echo "Refusing to release pre-release version $version." >&2
          exit 1
        fi

        TAG="v$version"
        # Allow reruns after the release commit and tag were pushed but later jobs failed.
        if git rev-parse -q --verify "refs/tags/$TAG^{commit}" >/dev/null; then
          tag_commit="$(git rev-list -n 1 "refs/tags/$TAG")"
          head_commit="$(git rev-parse HEAD)"

          # Never reuse a tag that points at a different commit.
          if [ "$tag_commit" != "$head_commit" ]; then
            echo "Tag $TAG already exists at $tag_commit, but this release commit is $head_commit." >&2
            exit 1
          fi

          echo "tag_exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "tag_exists=false" >> "$GITHUB_OUTPUT"
        fi

        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

    - name: Push release commit and tag
      if: steps.release.outputs.tag_exists == 'false'
      shell: bash
      env:
        TAG: ${{ steps.release.outputs.tag }}
      run: |
        git tag -a "$TAG" -m "Release $TAG"
        git push --atomic origin HEAD:main "refs/tags/$TAG"

  build:
    name: Build ${{ matrix.asset }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
          asset: chrome-debloat-linux-x86_64.tar.gz
          archive: tar
        - os: ubuntu-24.04-arm
          target: aarch64-unknown-linux-gnu
          asset: chrome-debloat-linux-aarch64.tar.gz
          archive: tar
        - os: macos-15-intel
          target: x86_64-apple-darwin
          asset: chrome-debloat-macos-x86_64.tar.gz
          archive: tar
        - os: macos-latest
          target: aarch64-apple-darwin
          asset: chrome-debloat-macos-aarch64.tar.gz
          archive: tar
        - os: windows-latest
          target: x86_64-pc-windows-msvc
          asset: chrome-debloat-windows-x86_64.zip
          archive: zip

    steps:
    - name: Checkout release tag
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.prepare.outputs.tag }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0
      with:
        targets: ${{ matrix.target }}

    - name: Build
      run: cargo build --release --locked --target "${{ matrix.target }}"

    - name: Package tarball
      if: matrix.archive == 'tar'
      run: |
        mkdir -p package
        cp "target/${{ matrix.target }}/release/chrome-debloat" package/
        tar -czf "${{ matrix.asset }}" -C package chrome-debloat

    - name: Generate checksum
      if: matrix.archive == 'tar'
      run: shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

    - name: Package zip
      if: matrix.archive == 'zip'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path package | Out-Null
        Copy-Item "target/${{ matrix.target }}/release/chrome-debloat.exe" package/
        Compress-Archive -Path package/chrome-debloat.exe -DestinationPath "${{ matrix.asset }}"

    - name: Generate checksum
      if: matrix.archive == 'zip'
      shell: pwsh
      run: |
        $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.asset }}").Hash.ToLowerInvariant()
        "$hash  ${{ matrix.asset }}" | Set-Content "${{ matrix.asset }}.sha256"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset }}
        path: |
          ${{ matrix.asset }}
          ${{ matrix.asset }}.sha256
        if-no-files-found: error

  upload:
    name: Upload release assets
    needs:
    - prepare
    - build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Upload GitHub release assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.tag }}
        files: dist/*
        generate_release_notes: true

  next-version:
    name: Bump next alpha version
    needs:
    - prepare
    - upload
    if: needs.upload.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Install Rust
      uses: dtolnay/rust-toolchain@1.95.0

    - name: Install cargo-release
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-release

    - name: Configure git author
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Bump next alpha version
      shell: bash
      run: |
        cargo release alpha \
          --execute \
          --no-confirm \
          --no-publish \
          --no-tag \
          --no-push

    - name: Push next version commit
      run: git push origin HEAD:main
