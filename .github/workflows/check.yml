name: Check

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: chrome-debloat-linux
          - os: macos-latest
            artifact: chrome-debloat-macos
          - os: windows-latest
            artifact: chrome-debloat-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: taiki-e/install-action@v2
        with:
          tool: rust@1.95.0+clippy

      - name: Install nightly rustfmt
        uses: taiki-e/install-action@v2
        with:
          tool: rust@nightly+rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-${{ matrix.os }}

      - name: Format
        run: cargo +nightly fmt --all --check

      - name: Clippy
        run: cargo +1.95.0 clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo +1.95.0 build --workspace --all-features --release --locked

      - name: Test
        run: cargo +1.95.0 test --workspace --all-features

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/chrome-debloat
            target/release/chrome-debloat.exe
          if-no-files-found: error
          retention-days: 1
