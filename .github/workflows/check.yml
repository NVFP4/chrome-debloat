name: Check

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: chrome-debloat-linux.tar.gz
          - os: macos-latest
            asset: chrome-debloat-macos.tar.gz
          - os: windows-latest
            asset: chrome-debloat-windows.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy

      - name: Install nightly rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Format
        run: cargo +nightly fmt --all --check

      - name: Clippy
        run: cargo +1.95.0 clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo +1.95.0 build --workspace --all-features --release --locked

      - name: Test
        run: cargo +1.95.0 test --workspace --all-features

      - name: Package binary
        if: runner.os != 'Windows'
        run: |
          mkdir -p package
          cp target/release/chrome-debloat package/
          tar -czf "${{ matrix.asset }}" -C package chrome-debloat

      - name: Package binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package | Out-Null
          Copy-Item target/release/chrome-debloat.exe package/
          Compress-Archive -Path package/chrome-debloat.exe -DestinationPath "${{ matrix.asset }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 1
